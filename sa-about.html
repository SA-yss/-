<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About | Seoul Auction Creatives</title>
  <meta name="description" content="Seoul Auction Creatives About" />
  <style>
    :root{
      --bg:#f5f5f3;
      --text:#111111;
      --muted:#666666;
      --line:#dddddd;
      --header-h:72px;
      --max:1680px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:
        "Pretendard",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        "Malgun Gothic",
        sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.5;
      word-break:keep-all;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      width:100%;
      height:auto;
    }

    .wrap{
      width:min(calc(100% - 56px), var(--max));
      margin:0 auto;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:100;
      height:var(--header-h);
      background:rgba(245,245,243,0.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(0,0,0,0.05);
    }

    .site-header .inner{
      width:min(calc(100% - 56px), var(--max));
      height:100%;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }

    .brand{
      font-size:18px;
      font-weight:700;
      letter-spacing:-0.03em;
      white-space:nowrap;
    }

    .desktop-nav{
      display:flex;
      align-items:center;
      gap:28px;
      margin-left:40px;
      flex:1;
    }

    .desktop-nav a{
      font-size:13px;
      font-weight:600;
      letter-spacing:0.04em;
      position:relative;
    }

    .desktop-nav a.active::after,
    .desktop-nav a:hover::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:100%;
      height:1px;
      background:#111;
    }

    .header-right{
      display:flex;
      align-items:center;
      gap:18px;
      font-size:13px;
      color:var(--muted);
    }

    .about-hero{
      padding:120px 0 90px;
      text-align:center;
    }

    .about-hero h1{
      font-size:20px;
      font-weight:800;
      margin-bottom:34px;
      letter-spacing:-0.03em;
    }

    .about-hero p{
      max-width:820px;
      margin:0 auto;
      font-size:18px;
      line-height:1.9;
      letter-spacing:-0.03em;
    }

    .about-visual{
      padding:0 0 120px;
    }

    .visual-box{
      width:100%;
      aspect-ratio: 16 / 8.2;
      background:#dbdbdb;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .visual-box img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .visual-placeholder{
      color:#f3f3f3;
      font-size:clamp(70px, 11vw, 240px);
      font-weight:800;
      letter-spacing:-0.06em;
      text-transform:uppercase;
      line-height:0.9;
      text-align:center;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      color:var(--muted);
      margin-top:50px;
    }

    .back-link:hover{
      color:#111;
    }

    @media (max-width: 980px){
      .desktop-nav{
        gap:18px;
        margin-left:20px;
      }

      .about-hero{
        padding:90px 0 60px;
      }

      .about-hero p{
        font-size:16px;
        line-height:1.8;
      }
    }

    @media (max-width: 640px){
      :root{
        --header-h:64px;
      }

      .site-header .inner,
      .wrap{
        width:min(calc(100% - 28px), var(--max));
      }

      .brand{
        font-size:16px;
      }

      .desktop-nav{
        gap:14px;
        margin-left:12px;
        overflow-x:auto;
      }

      .desktop-nav a{
        white-space:nowrap;
      }

      .header-right{
        display:none;
      }

      .about-hero{
        padding:70px 0 44px;
      }

      .about-hero h1{
        font-size:18px;
        margin-bottom:24px;
      }

      .about-hero p{
        font-size:14px;
        line-height:1.8;
      }

      .about-visual{
        padding-bottom:70px;
      }

      .visual-box{
        aspect-ratio: 4 / 5;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <a href="index.html" class="brand">Seoul Auction Creatives</a>

      <nav class="desktop-nav" aria-label="주 메뉴">
        <a href="sa-about.html" class="active">ABOUT</a>
        <a href="index.html#work">WORK</a>
        <a href="index.html#archive">ARCHIVE</a>
        <a href="index.html#download">DOWNLOAD</a>
        <a href="index.html#ci">CI</a>
        <a href="index.html#contact">CONTACT</a>
      </nav>

      <div class="header-right">
        <span>Seoul Auction</span>
      </div>
    </div>
  </header>

  <main>
    <section class="about-hero">
      <div class="wrap">
        <h1>ABOUT</h1>
        <p>
          서울옥션 크리에이티브는 전시와 경매, 그리고 예술 콘텐츠를 통해 만들어진
          다양한 시각적 결과물과 디자인 작업들을 창작자의 관점에서 재해석하고 기록하는
          디지털 아카이브입니다.
        </p>

        <a href="index.html" class="back-link">← BACK TO HOME</a>
      </div>
    </section>

    <section class="about-visual">
      <div class="wrap">
        <div class="visual-box">
          <div class="visual-box">
            <img src="images/sa-8.jpg" alt="Seoul Auction Creatives About">
          </div>
         
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
