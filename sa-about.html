<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About | Seoul Auction Creatives</title>
  <meta name="description" content="Seoul Auction Creatives About" />
  <style>
    :root{
      --bg:#ffffff;
      --text:#111111;
      --muted:#6f6f6f;
      --line:#e9e9e9;
      --soft:#f7f7f7;
      --header-h:72px;
      --max:1920px;
      --menu-panel-w:min(68vw, 520px);
      --search-w:320px;
      --search-gap:24px;
      --search-move:calc(var(--search-w) + var(--search-gap));
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:
        "Pretendard",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        "Malgun Gothic",
        sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
      word-break:keep-all;
    }

    body.menu-open{
      overflow:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    button{
      font:inherit;
      color:inherit;
      background:none;
      border:none;
      cursor:pointer;
    }

    input{
      font:inherit;
      color:inherit;
      background:none;
      border:none;
      outline:none;
    }

    .wrap{
      width:min(calc(100% - 50px), var(--max));
      margin:0 auto;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:100;
      height:var(--header-h);
      background:rgba(255,255,255,0.92);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(0,0,0,0.06);
    }

    .site-header .inner{
      width:min(calc(100% - 24px), var(--max));
      height:100%;
      margin:0 auto;
      display:flex;
      align-items:center;
      position:relative;
      gap:20px;
    }

    .brand{
      flex:0 0 auto;
      min-width:0;
      margin-left:20px;
      margin-right:auto;
      font-size:22px;
      font-weight:400 !important;
      font-style:normal !important;
      letter-spacing:0 !important;
      white-space:nowrap;
      font-family:"Didot", "Didot LT Std", "Bodoni 72", "Times New Roman", serif !important;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      position:relative;
      z-index:6;
      transition:opacity .25s ease;
    }

    .desktop-nav{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:28px;
      flex:0 0 auto;
      margin-left:auto;
      position:relative;
      z-index:3;
      transition:transform .35s ease, opacity .25s ease;
      will-change:transform;
    }

    .desktop-nav a{
      position:relative;
      font-size:13px;
      font-weight:400;
      letter-spacing:0.04em;
      white-space:nowrap;
    }

    .desktop-nav a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:0;
      height:1px;
      background:#111;
      transition:width .25s ease;
    }

    .desktop-nav a:hover::after,
    .desktop-nav a.active::after{
      width:100%;
    }

    .header-tools{
      display:flex;
      align-items:center;
      gap:10px;
      flex:0 0 auto;
      position:relative;
      z-index:8;
      transition:opacity .25s ease;
    }

    .icon-btn{
      width:40px;
      height:40px;
      border-radius:999px;
      border:1px solid transparent;
      display:grid;
      place-items:center;
      transition:.2s ease, opacity .25s ease;
      flex:0 0 auto;
    }

    .icon-btn:hover{
      background:var(--soft);
      border-color:var(--line);
    }

    .menu-btn{
      display:none;
    }

    .search-toggle{
      position:relative;
      z-index:9;
    }

    .search-close{
      opacity:0;
      pointer-events:none;
      position:absolute;
      right:0;
      top:50%;
      transform:translateY(-50%);
      z-index:10;
    }

    .header-search{
      position:absolute;
      right:64px;
      top:50%;
      transform:translateY(-50%);
      width:var(--search-w);
      height:44px;
      display:flex;
      align-items:center;
      gap:14px;
      padding:0 16px;
      border:1px solid rgba(0,0,0,0.08);
      border-radius:999px;
      background:rgba(255,255,255,0.96);
      opacity:0;
      pointer-events:none;
      transition:opacity .28s ease, transform .35s ease, left .35s ease, right .35s ease, width .35s ease;
      z-index:7;
    }

    .header-search svg{
      flex:0 0 auto;
    }

    .header-search input{
      width:100%;
      font-size:14px;
      letter-spacing:-0.01em;
    }

    .header-search input::placeholder{
      color:#8b8b8b;
    }

    .search-hint{
      font-size:12px;
      color:#999;
      white-space:nowrap;
    }

    .about-hero{
      padding:110px 0 70px;
      text-align:center;
    }

    .about-hero h1{
      font-size:20px;
      font-weight:800;
      margin-bottom:34px;
      letter-spacing:-0.03em;
    }

    .about-hero p{
      max-width:760px;
      margin:0 auto;
      font-size:16px;
      line-height:1.9;
      letter-spacing:-0.03em;
    }

    .about-visual{
      padding:0 0 120px;
    }

    .about-visual-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .visual-box{
      width:100%;
      aspect-ratio:16 / 9;
      background:transparent;
      overflow:hidden;
      position:relative;
      box-shadow:none;
      filter:none;
    }

    .visual-box img{
      box-shadow:none;
      filter:none;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      color:var(--muted);
      margin-top:40px;
      align-self:center;
    }

    .back-link:hover{
      color:#111;
    }

    .mobile-menu{
      position:fixed;
      inset:0;
      z-index:300;
      pointer-events:none;
    }

    .mobile-menu.active{
      pointer-events:auto;
    }

    .mobile-menu-dim{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0);
      transition:background .28s ease;
    }

    .mobile-menu.active .mobile-menu-dim{
      background:rgba(0,0,0,0.42);
    }

    .mobile-menu-panel{
      position:absolute;
      top:0;
      right:0;
      width:var(--menu-panel-w);
      max-width:100%;
      height:100dvh;
      background:#ffffff;
      transform:translateX(100%);
      transition:transform .3s ease;
      display:flex;
      flex-direction:column;
      padding:22px 24px 28px;
      overflow-y:auto;
      box-shadow:none;
    }

    .mobile-menu.active .mobile-menu-panel{
      transform:translateX(0);
    }

    .mobile-menu-top{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      margin-bottom:18px;
    }

    .mobile-close{
      width:40px;
      height:40px;
      display:grid;
      place-items:center;
      font-size:34px;
      line-height:1;
      color:#111;
    }

    .mobile-nav-main{
      display:flex;
      flex-direction:column;
      gap:22px;
      padding:6px 0 26px;
    }

    .mobile-nav-main a{
      font-size:22px;
      font-weight:400;
      letter-spacing:-0.03em;
    }

    .mobile-nav-main a.current{
      font-weight:700;
    }

    .mobile-sub-wrap{
      margin-top:8px;
      padding-top:24px;
      border-top:1px solid #d9d9d9;
    }

    .mobile-sub-title{
      font-size:12px;
      letter-spacing:0.12em;
      color:#888;
      margin-bottom:18px;
    }

    .mobile-sub-list{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .mobile-sub-list a{
      font-size:18px;
      line-height:1.4;
      letter-spacing:-0.02em;
    }

    .mobile-sub-list a.current{
      font-weight:700;
    }

    /* desktop large */
    @media (min-width: 1201px){
      body.search-active .desktop-nav{
        transform:translateX(calc(-1 * var(--search-move)));
        opacity:1;
        pointer-events:auto;
      }

      body.search-active .header-search{
        opacity:1;
        pointer-events:auto;
        transform:translateY(-50%);
      }

      body.search-active .search-open{
        opacity:0;
        pointer-events:none;
      }

      body.search-active .search-close{
        opacity:1;
        pointer-events:auto;
      }
    }

    /* tablet / small laptop */
    @media (max-width: 1200px){
      .header-search{
        right:56px;
        width:min(42vw, 360px);
      }

      body.search-active .desktop-nav{
        opacity:0;
        pointer-events:none;
        transform:none;
      }

      body.search-active .header-search{
        opacity:1;
        pointer-events:auto;
        transform:translateY(-50%);
      }

      body.search-active .search-open{
        opacity:0;
        pointer-events:none;
      }

      body.search-active .search-close{
        opacity:1;
        pointer-events:auto;
      }
    }

    @media (max-width: 1180px){
      .desktop-nav{
        gap:20px;
      }

      .brand{
        font-size:20px;
      }
    }

    @media (max-width: 980px){
      .brand{
        font-size:19px;
      }

      .header-search{
        left:220px;
        right:56px;
        width:auto;
      }

      .desktop-nav{
        gap:18px;
      }

      .about-hero{
        padding:90px 0 56px;
      }

      .about-hero p{
        font-size:15px;
      }
    }

    @media (max-width: 763px){
      .desktop-nav{
        display:none;
      }

      .menu-btn{
        display:grid;
      }

      .header-search{
        left:16px;
        right:64px;
        width:auto;
        height:40px;
        display:flex;
      }

      .search-close{
        display:grid;
      }

      body.search-active .brand{
        opacity:0;
        pointer-events:none;
      }

      body.search-active .menu-btn{
        opacity:0;
        pointer-events:none;
      }

      body.search-active .header-search{
        opacity:1;
        pointer-events:auto;
        transform:translateY(-50%);
      }

      body.search-active .search-open{
        opacity:0;
        pointer-events:none;
      }

      body.search-active .search-close{
        opacity:1;
        pointer-events:auto;
      }

      .about-hero{
        padding:72px 0 44px;
      }

      .about-hero h1{
        font-size:18px;
        margin-bottom:22px;
      }

      .about-hero p{
        font-size:14px;
        line-height:1.8;
      }

      .about-visual{
        padding-bottom:70px;
      }
    }

    @media (max-width: 640px){
      :root{
        --header-h:64px;
        --menu-panel-w:64vw;
      }

      .site-header .inner,
      .wrap{
        width:min(calc(100% - 28px), var(--max));
      }

      .brand{
        margin-left:0;
        font-size:16px;
        max-width:70vw;
        overflow:hidden;
        text-overflow:ellipsis;
      }

      .header-search{
        left:12px;
        right:56px;
        height:38px;
        padding:0 14px;
      }

      .mobile-nav-main a{
        font-size:18px;
      }

      .mobile-sub-list a{
        font-size:16px;
      }

      .back-link{
        margin-top:20px;
        font-size:12px;
      }
    }
  </style>
</head>
<body data-page="about">
  <header class="site-header">
    <div class="inner">
      <a href="index.html" class="brand">Seoul Auction Creatives</a>

      <nav class="desktop-nav" aria-label="주 메뉴">
        <a href="sa-about.html" class="active">ABOUT</a>
        <a href="sa-work.html">WORK</a>
        <a href="sa-archive.html">ARCHIVE</a>
        <a href="sa-download.html">DOWNLOAD</a>
        <a href="sa-ci.html">CI</a>
        <a href="sa-contact.html">CONTACT</a>
      </nav>

      <div class="header-tools">
        <button class="icon-btn search-toggle search-open" id="searchOpenBtn" aria-label="검색 열기">
          <svg width="18" height="18" viewBox="0 0 17 17" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M7.56021 0C11.7313 0 15.0988 3.36747 15.0988 7.56021C15.0988 11.753 11.7313 15.0988 7.56021 15.0988C3.38909 15.0988 0 11.7316 0 7.56021C0 3.38879 3.36747 0 7.56021 0ZM12.0791 3.0197C10.9276 1.86828 9.32008 1.15142 7.56021 1.15142C5.80034 1.15142 4.17112 1.86828 3.0197 3.0197C1.86828 4.17112 1.15142 5.77872 1.15142 7.56021C1.15142 9.3417 1.86828 10.9276 3.0197 12.0791C4.17112 13.2305 5.77872 13.9693 7.56021 13.9693C9.3417 13.9693 10.9276 13.2305 12.0791 12.0791C13.2522 10.9276 13.9693 9.32008 13.9693 7.56021C13.9693 5.80034 13.2525 4.17112 12.0791 3.0197Z" fill="#111"/>
            <path d="M16.8368 16.0331C17.0539 16.2502 17.0539 16.6196 16.8368 16.837C16.6196 17.0542 16.2502 17.0542 16.0328 16.837L12.3395 13.1438C12.1224 12.9266 12.1224 12.5572 12.3395 12.3398C12.5567 12.1007 12.926 12.1007 13.1435 12.3398L16.8368 16.0331Z" fill="#111"/>
          </svg>
        </button>

        <button class="icon-btn search-close" id="searchCloseBtn" aria-label="검색 닫기">✕</button>

        <button class="icon-btn menu-btn" id="menuBtn" aria-label="메뉴 열기">
          <svg width="18" height="10" viewBox="0 0 18 10" fill="none">
            <path d="M0 1H18M0 9H18" stroke="#111" stroke-width="2"/>
          </svg>
        </button>
      </div>

      <form class="header-search" id="headerSearchForm" role="search">
        <svg width="16" height="16" viewBox="0 0 17 17" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M7.56021 0C11.7313 0 15.0988 3.36747 15.0988 7.56021C15.0988 11.753 11.7313 15.0988 7.56021 15.0988C3.38909 15.0988 0 11.7316 0 7.56021C0 3.38879 3.36747 0 7.56021 0ZM12.0791 3.0197C10.9276 1.86828 9.32008 1.15142 7.56021 1.15142C5.80034 1.15142 4.17112 1.86828 3.0197 3.0197C1.86828 4.17112 1.15142 5.77872 1.15142 7.56021C1.15142 9.3417 1.86828 10.9276 3.0197 12.0791C4.17112 13.2305 5.77872 13.9693 7.56021 13.9693C9.3417 13.9693 10.9276 13.2305 12.0791 12.0791C13.2522 10.9276 13.9693 9.32008 13.9693 7.56021C13.9693 5.80034 13.2525 4.17112 12.0791 3.0197Z" fill="#111"/>
          <path d="M16.8368 16.0331C17.0539 16.2502 17.0539 16.6196 16.8368 16.837C16.6196 17.0542 16.2502 17.0542 16.0328 16.837L12.3395 13.1438C12.1224 12.9266 12.1224 12.5572 12.3395 12.3398C12.5567 12.1007 12.926 12.1007 13.1435 12.3398L16.8368 16.0331Z" fill="#111"/>
        </svg>
        <input type="text" id="headerSearchInput" placeholder="Search projects, archive, resources..." />
        <span class="search-hint">ESC</span>
      </form>
    </div>
  </header>

  <main>
    <section class="about-hero">
      <div class="wrap">
        <h1>ABOUT</h1>
        <p>
          서울옥션 크리에이티브는 전시와 경매, 그리고 예술 콘텐츠를 통해 만들어진
          다양한 시각적 결과물과 디자인 작업들을 창작자의 관점에서 재해석하고 기록하는
          디지털 아카이브입니다.
        </p>
      </div>
    </section>

    <section class="about-visual">
      <div class="wrap about-visual-wrap">
        <div class="visual-box">
          <img src="images/sa-8.jpg" alt="Seoul Auction Creatives About">
        </div>
        <a href="index.html" class="back-link">← BACK TO HOME</a>
      </div>
    </section>
  </main>

  <aside class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <div class="mobile-menu-dim" id="menuDim"></div>

    <div class="mobile-menu-panel">
      <div class="mobile-menu-top">
        <button class="mobile-close" id="closeMenu" aria-label="메뉴 닫기">×</button>
      </div>

      <nav class="mobile-nav-main" id="mobileMainNav" aria-label="모바일 주 메뉴"></nav>

      <div class="mobile-sub-wrap">
        <p class="mobile-sub-title" id="mobileSubTitle">ABOUT</p>
        <div class="mobile-sub-list" id="mobileSubList"></div>
      </div>
    </div>
  </aside>

  <script>
    const pageKey = document.body.dataset.page || 'about';

    const mainMenu = [
      { key:'about', label:'ABOUT', href:'sa-about.html' },
      { key:'work', label:'WORK', href:'sa-work.html' },
      { key:'archive', label:'ARCHIVE', href:'sa-archive.html' },
      { key:'download', label:'DOWNLOAD', href:'sa-download.html' },
      { key:'ci', label:'CI', href:'sa-ci.html' },
      { key:'contact', label:'CONTACT', href:'sa-contact.html' }
    ];

    const subMenuData = {
      about: {
        title: 'ABOUT',
        items: [
          { label:'Introduction', href:'sa-about.html', current:true },
          { label:'Vision', href:'sa-about.html' },
          { label:'Story', href:'sa-about.html' }
        ]
      },
      work: {
        title: 'WORK',
        items: [
          { label:'Brand', href:'sa-work.html' },
          { label:'Corporate', href:'sa-work.html' },
          { label:'Award-winning', href:'sa-work.html' }
        ]
      },
      archive: {
        title: 'ARCHIVE',
        items: [
          { label:'Exhibition Records', href:'sa-archive.html' },
          { label:'Research & Reference', href:'sa-archive.html' },
          { label:'Project Documentation', href:'sa-archive.html' }
        ]
      },
      download: {
        title: 'DOWNLOAD',
        items: [
          { label:'Forms', href:'sa-download.html' },
          { label:'Templates', href:'sa-download.html' },
          { label:'Press Kit', href:'sa-download.html' }
        ]
      },
      ci: {
        title: 'CI',
        items: [
          { label:'Logo System', href:'sa-ci.html' },
          { label:'Typography & Color', href:'sa-ci.html' },
          { label:'Guideline PDF', href:'sa-ci.html' }
        ]
      },
      contact: {
        title: 'CONTACT',
        items: [
          { label:'General Inquiry', href:'sa-contact.html' },
          { label:'Design Team', href:'sa-contact.html' }
        ]
      }
    };

    const mobileMainNav = document.getElementById('mobileMainNav');
    const mobileSubTitle = document.getElementById('mobileSubTitle');
    const mobileSubList = document.getElementById('mobileSubList');

    function renderMobileMenu() {
      mobileMainNav.innerHTML = mainMenu.map(item => {
        const currentClass = item.key === pageKey ? 'current' : '';
        return `<a href="${item.href}" class="${currentClass}">${item.label}</a>`;
      }).join('');

      const currentSub = subMenuData[pageKey] || subMenuData.about;
      mobileSubTitle.textContent = currentSub.title;
      mobileSubList.innerHTML = currentSub.items.map(item => {
        const currentClass = item.current ? 'current' : '';
        return `<a href="${item.href}" class="${currentClass}">${item.label}</a>`;
      }).join('');
    }

    renderMobileMenu();

    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const closeMenu = document.getElementById('closeMenu');
    const menuDim = document.getElementById('menuDim');

    function openMenu() {
      mobileMenu.classList.add('active');
      mobileMenu.setAttribute('aria-hidden', 'false');
      document.body.classList.add('menu-open');
    }

    function closeMobileMenu() {
      mobileMenu.classList.remove('active');
      mobileMenu.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('menu-open');
    }

    if (menuBtn) {
      menuBtn.addEventListener('click', openMenu);
    }

    if (closeMenu) {
      closeMenu.addEventListener('click', closeMobileMenu);
    }

    if (menuDim) {
      menuDim.addEventListener('click', closeMobileMenu);
    }

    const searchOpenBtn = document.getElementById('searchOpenBtn');
    const searchCloseBtn = document.getElementById('searchCloseBtn');
    const headerSearchInput = document.getElementById('headerSearchInput');
    const headerSearchForm = document.getElementById('headerSearchForm');

    function openSearch() {
      document.body.classList.add('search-active');
      setTimeout(() => {
        headerSearchInput.focus();
      }, 180);
    }

    function closeSearch() {
      document.body.classList.remove('search-active');
      headerSearchInput.value = '';
    }

    if (searchOpenBtn) {
      searchOpenBtn.addEventListener('click', openSearch);
    }

    if (searchCloseBtn) {
      searchCloseBtn.addEventListener('click', closeSearch);
    }

    if (headerSearchForm) {
      headerSearchForm.addEventListener('submit', (e) => {
        e.preventDefault();
      });
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeMobileMenu();
        closeSearch();
      }
    });

    window.addEventListener('resize', () => {
      closeSearch();
    });
  </script>
</body>
</html>
